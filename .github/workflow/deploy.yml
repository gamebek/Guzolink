name: Guzo-link app cd

on:
  push:
    branches:
      - main
      - master
      - dev-test-ci-cd
jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/guzolink:latest
  deploy-to-azure:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: build-docker-image
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/guzolink:latest
            docker stop guzolink || true
            docker rm guzolink || true
            docker run -d --name guzolink --restart=always --network guzolink-mesh -p 5000:5000 --env-file home/fraol/secrets/guzolink-app.env ${{ secrets.DOCKERHUB_USERNAME }}/guzolink:latest
